{% extends 'base.html' %}
{% block content %}
<h2>Tags</h2>

<ul>
    {% for tag in tags %}
        <li>
            {{ tag.name }}
            <a href="{% url 'tag-edit' tag.pk %}">Edit</a>
            <a href="{% url 'tag-delete' tag.pk %}">Delete</a>
        </li>
    {% endfor %}
</ul>

<a href="{% url 'tag-create' %}">Create new tag</a>
{% endblock %}
