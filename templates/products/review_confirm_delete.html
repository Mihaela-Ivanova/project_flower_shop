{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Delete Review</h2>
    <p>Are you sure you want to delete this review?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn delete">Delete</button>
        <a href="{% url 'product_details' pk=object.product.pk %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
