{% extends 'base.html' %}

{% block content %}
<h1 class="text-center mb-4">Our Products</h1>

<div class="text-center mb-4">
    <a href="{% url 'flower_create' %}" class="btn btn-pink">Add Product</a>
</div>

<div class="row">
    {% for flower in flowers %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">

                {% if flower.image %}
                    <img src="{{ flower.image }}"
                         alt="{{ flower.name }}"
                         style="width: 100%; height: 250px; object-fit: cover;">
                {% else %}
                    <img src="https://via.placeholder.com/300x250?text=No+Image"
                         alt="No image"
                         style="width: 100%; height: 250px; object-fit: cover;">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">{{ flower.name }}</h5>
                    <p class="card-text">{{ flower.price }} €</p>
                    <a href="{% url 'product_details' flower.pk %}" class="btn btn-sm btn-primary">Details</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-center">No products added yet.</p>
    {% endfor %}
</div>
{% endblock %}
